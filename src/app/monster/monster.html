<div class="monster-list">
    <h1>Monsters</h1>
    <p>Explora el mundo de monstruos</p>
   <button (click)="accion()">Ver monstruos</button> 
   
   <table *ngIf="mostrarTabla">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Size</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let monster of monsters">
            <td>{{ monster.name }}</td>
            <td>{{ monster.size }}</td>
        </tr>
    </tbody>
    </table>
</div>
